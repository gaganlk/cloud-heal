{{/* ── Backend Deployment ──────────────────────────────────────────────────── */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.backend.name }}
    version: {{ .Values.backend.image.tag | quote }}
    app.kubernetes.io/part-of: cloud-healing
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
      {{- if .Values.vault.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: "secret/cloud-healing/config"
      {{- end }}
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: ENV
              value: {{ .Values.backend.env.ENV | default "production" | quote }}
            - name: UVICORN_WORKERS
              value: {{ .Values.backend.env.UVICORN_WORKERS | default "4" | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: kafka-brokers
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: encryption-key
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: jwt-secret
            {{- if .Values.vault.enabled }}
            - name: VAULT_ADDR
              value: {{ .Values.vault.addr | quote }}
            - name: VAULT_MOUNT
              value: {{ .Values.vault.mount | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
{{/* ── Frontend Deployment ─────────────────────────────────────────────────── */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.frontend.name }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
      containers:
        - name: ui
          image: "{{ .Values.global.imageRegistry }}{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
---
{{/* ── Healing Worker Deployment ───────────────────────────────────────────── */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.worker.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.worker.name }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.worker.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.worker.name }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          command: ["python", "-m", "services.healing_worker"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: redis-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: kafka-brokers
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: encryption-key
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- if .Values.driftWorker.enabled }}
---
{{/* ── Drift Detection Worker ───────────────────────────────────────────────── */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.driftWorker.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.driftWorker.name }}
spec:
  replicas: {{ .Values.driftWorker.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.driftWorker.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.driftWorker.name }}
    spec:
      containers:
        - name: drift-worker
          image: "{{ .Values.global.imageRegistry }}{{ .Values.driftWorker.image.repository }}:{{ .Values.driftWorker.image.tag }}"
          command: ["python", "-m", "services.drift_worker"]
          env:
            - name: DRIFT_POLL_INTERVAL
              value: {{ .Values.driftWorker.pollIntervalSeconds | default 60 | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cloud-healing-secrets
                  key: redis-url
{{- end }}
