---
# ── Secret — do NOT commit real values ───────────────────────────────────────
# In production: use `kubectl create secret generic` or Vault Agent Injector
apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops-platform
type: Opaque
stringData:
  # kubectl create secret generic aiops-secrets \
  #   --from-literal=database-url="postgresql+asyncpg://..." \
  #   --from-literal=secret-key="$(openssl rand -hex 32)" \
  #   --from-literal=encryption-key="$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" \
  #   --from-literal=redis-url="redis://redis-service:6379" \
  #   -n aiops-platform --dry-run=client -o yaml | kubectl apply -f -
  database-url: "postgresql+asyncpg://aiops_user:CHANGE_ME@pgbouncer-service:5432/cloud_healing_db"
  secret-key: "CHANGE_ME_USE_OPENSSL_RAND_HEX_32"
  encryption-key: "CHANGE_ME_USE_FERNET_GENERATE_KEY"
  redis-url: "redis://redis-service:6379"
---
# ── ConfigMap — non-secret configuration ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  namespace: aiops-platform
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  OTLP_ENDPOINT: "http://jaeger-service:4317"
  DEGRADATION_THRESHOLD: "0.75"
  DEDUP_TTL_SECONDS: "3600"
  CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
  ENV: "production"
  UVICORN_WORKERS: "2"
  CHAOS_SAFETY_BYPASS: "false"
