# AIOps Redis Production Configuration

# Memory limits
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Networking
bind 0.0.0.0
protected-mode no
tcp-keepalive 300

# Logging
loglevel notice
