server {
    listen 80;
    server_name _;

    # Strict HTTPS Redirect (Uncomment for production with certificates)
    # return 301 https://$host$request_uri;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: http://localhost:8000 http://localhost:8085 https:;" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Static Asset Caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA Routing ──────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://aiops_backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings for long-running cloud scans (up to 5 minutes)
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Buffer settings for large scan results
        proxy_buffers 16 4k;
        proxy_buffer_size 8k;
    }

    # ── WebSocket Proxy ──────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://aiops_backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket keepalive (24h max session)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health Check Endpoint ────────────────────────────────────────────────
    location /health {
        proxy_pass http://aiops_backend:8000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Metrics (restrict to internal) ───────────────────────────────────────
    location /metrics {
        proxy_pass http://aiops_backend:8000/metrics;
        # In production, restrict to internal monitoring IPs:
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Error Pages ──────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
